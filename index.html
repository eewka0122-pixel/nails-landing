<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Маникюр Братиславская</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0f0f0f;
  color: #fff;
}

.hero {
  padding: 100px 20px;
  text-align: center;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  margin-bottom: 10px;
}

p {
  color: #ccc;
}

button {
  padding: 14px 24px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

section {
  padding: 60px 20px;
  text-align: center;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
}

input {
  padding: 12px;
  margin: 5px;
  width: 80%;
  border-radius: 10px;
  border: none;
}

.cta {
  background: #111;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Маникюр с гель-лаком за 60 минут</h1>
  <p>Премиальный сервис рядом с м. Братиславская</p>
  <button>Записаться онлайн</button>
</div>

<section>
  <h2>Почему выбирают нас</h2>
  <div class="card">Скорость — 60 минут</div>
  <div class="card">Гарантия 7 дней</div>
  <div class="card">Опыт мастеров 5+ лет</div>
</section>

<section>
  <h2>Цены</h2>
  <p>Маникюр + гель-лак — от 1500 ₽</p>
</section>

<section class="cta">
  <h2>Запишитесь сейчас</h2>
  <input placeholder="Ваше имя">
  <br>
  <input placeholder="Телефон">
  <br>
  <button>Получить скидку</button>
</section>

</body>
</html>
