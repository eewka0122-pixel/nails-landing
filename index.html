<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0f0f0f;
  color: white;
}

.hero {
  padding: 120px 20px;
  text-align: center;
  background: radial-gradient(circle at center, #1a1a1a, #000);
}

h1 {
  font-family: 'Playfair Display';
  font-size: 42px;
}

p {
  color: #aaa;
}

button {
  padding: 14px 28px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
  color: white;
  font-weight: bold;
  margin-top: 20px;
  cursor: pointer;
}

section {
  padding: 80px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255,77,109,0.2);
}

.gallery img {
  width: 90%;
  border-radius: 15px;
  margin: 10px 0;
}

input {
  padding: 12px;
  width: 80%;
  border-radius: 10px;
  border: none;
  margin: 5px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Маникюр с гель-лаком за 60 минут</h1>
  <p>Премиальный сервис рядом с м. Братиславская</p>
  <button>Записаться онлайн</button>
</div>

<section>
  <h2>Почему выбирают нас</h2>
  <div class="cards">
    <div class="card">Скорость — 60 минут</div>
    <div class="card">Гарантия 7 дней</div>
    <div class="card">Опыт мастеров 5+ лет</div>
  </div>
</section>

<section class="gallery">
  <h2>Наши работы</h2>
  <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
  <img src="https://images.unsplash.com/photo-1610992015732-2449b76344bc">
</section>

<section>
  <h2>Цены</h2>
  <p>Маникюр + гель-лак — от 1500 ₽</p>
</section>

<section>
  <h2>Запишитесь сейчас</h2>
  <input placeholder="Имя"><br>
  <input placeholder="Телефон"><br>
  <button>Получить скидку</button>
</section>

</body>
</html>
